services:
  - type: web
    name: fuelmap-route-planner
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_MAPS_KEY
        sync: false
      - key: FUEL_PRICE_PER_LITER
        value: "104.0"